<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contextual Clarity AI | Enterprise Semantics Engine</title>
    <style>
        :root {
            --navy: #0f172a;
            --blue: #2563eb;
            --light-blue: #eff6ff;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            color: var(--navy);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--blue);
            letter-spacing: -0.025em;
        }

        .container {
            max-width: 900px;
            width: 90%;
            margin: 3rem auto;
            flex-grow: 1;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }

        .hero p {
            color: #64748b;
            font-size: 1.125rem;
        }

        .editor-container {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow: hidden;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 1.5rem;
            border: none;
            outline: none;
            font-size: 1.1rem;
            line-height: 1.7;
            resize: none;
            box-sizing: border-box;
            color: var(--navy);
        }

        .footer-tools {
            background: #f1f5f9;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: #475569;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }

        .btn {
            background: var(--blue);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .output-box {
            margin-top: 2rem;
            display: none;
            background: var(--light-blue);
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
        }

        .output-label {
            position: absolute;
            top: -12px;
            left: 1rem;
            background: var(--blue);
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        #resultText {
            margin: 0;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #1e40af;
        }

        .badge-list {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">CONTEXTUAL CLARITY AI</div>
    <div style="font-size: 0.8rem; font-weight: bold; color: #94a3b8;">v2.0 ENTERPRISE</div>
</header>

<div class="container">
    <div class="hero">
        <h1>Refine Your Communication</h1>
        <p>Our Neural Semantics Engine identifies and resolves homophone ambiguity.</p>
    </div>

    <div class="editor-container">
        <textarea id="editor" placeholder="Type or paste your text here... e.g., 'I will accept the award.'"></textarea>
        <div class="footer-tools">
            <div class="status"><div class="status-dot"></div> Semantic Logic: ONLINE</div>
            <button class="btn" onclick="enhance()">Enhance Context</button>
        </div>
    </div>

    <div id="outputBox" class="output-box">
        <div class="output-label">Optimized Result</div>
        <p id="resultText"></p>
    </div>

    <div class="badge-list">
        <span>✓ 256-bit NLP Encryption</span>
        <span>✓ Zero-Latency Inference</span>
        <span>✓ Trusted by Fortune 0.5 Companies</span>
    </div>
</div>

<script>
    const confusionMap = {
        "accept": "except",
        "except": "accept",
        "affect": "effect",
        "effect": "affect",
        "there": "their",
        "their": "they're",
        "they're": "there",
        "weather": "whether",
        "whether": "weather",
        "principal": "principle",
        "principle": "principal",
        "loose": "lose",
        "lose": "loose",
        "stationary": "stationery",
        "stationery": "stationary",
        "complement": "compliment",
        "compliment": "complement",
        "ensure": "insure",
        "insure": "ensure",
        "council": "counsel",
        "counsel": "council",
        "advice": "advise",
        "advise": "advice",
        "bear": "bare",
        "bare": "bear"
    };

    function enhance() {
        const input = document.getElementById('editor').value;
        if (!input.trim()) return;

        const words = input.split(/(\s+)/);
        const transformed = words.map(word => {
            // Extract punctuation
            const cleanWord = word.toLowerCase().replace(/[.,!?;:]/g, "");
            const puncMatch = word.match(/[.,!?;:]/g);
            const punc = puncMatch ? puncMatch.join('') : "";

            if (confusionMap[cleanWord]) {
                const target = confusionMap[cleanWord];
                // Match case
                let final;
                if (word[0] === word[0].toUpperCase()) {
                    final = target.charAt(0).toUpperCase() + target.slice(1);
                } else {
                    final = target;
                }
                return final + punc;
            }
            return word;
        });

        document.getElementById('resultText').innerText = transformed.join('');
        document.getElementById('outputBox').style.display = 'block';
    }
</script>

</body>
</html>
